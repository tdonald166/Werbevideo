<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Werbevideo Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/static/templates.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@400;700&family=Anton&family=Bebas+Neue&family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Outfit:wght@600&family=Cormorant+Garamond:wght@600&family=Archivo+Black&family=Audiowide&family=Manrope:wght@600&family=DM+Sans:wght@600&family=Lora:wght@600&family=Kanit:wght@700&family=Righteous&family=Montserrat:wght@600&family=Lato:wght@700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', system-ui, sans-serif; }
 .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
  .gradient-text { background: linear-gradient(135deg,#ff6b6b 0%,#ffa500 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .scroll-thin::-webkit-scrollbar { width: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); } 70% { box-shadow: 0 0 0 30px rgba(220,38,38,0); } 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); } }
  .pulse-ring { animation: pulse-ring 2s infinite; }
  .variant-card.selected { border-color: #f59e0b; box-shadow: 0 0 30px rgba(245,158,11,0.4); }
  .dropzone-active { border-color: #f59e0b !important; background: rgba(245,158,11,0.08) !important; }
</style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen" x-data="app()" x-init="init()">

<!-- Header -->
<header class="sticky top-0 z-30 bg-[#0a0a0f]/90 backdrop-blur-md border-b border-white/5">
 <div class="max-w-7xl mx-auto px-3 md:px-6 py-3 md:py-4 flex items-center justify-between gap-2">
   <!-- Logo + Title -->
   <div class="flex items-center gap-2 md:gap-3 min-w-0">
     <div class="w-9 h-9 md:w-10 md:h-10 rounded-lg bg-gradient-to-br from-amber-500 to-red-600 flex items-center justify-center text-xl flex-shrink-0"></div>
     <div class="min-w-0">
       <div class="text-base md:text-lg font-bold leading-none truncate">Werbevideo Generator</div>
       <div class="hidden sm:block text-xs text-white/50 leading-none mt-1">KI-gestützte Werbespots</div>
     </div>
   </div>
   <!-- Desktop nav (md+) -->
   <div class="hidden md:flex items-center gap-2 lg:gap-3">
     <button @click="view='library'" :class="view==='library' ? 'bg-white/10' : 'hover:bg-white/5'" class="px-3 lg:px-4 py-2 rounded-lg text-sm font-medium transition">Bibliothek</button>
     <button @click="view='website'; resetWebsite()" :class="view==='website' ? 'bg-cyan-500/30 text-cyan-200' : 'bg-cyan-500/15 text-cyan-300 hover:bg-cyan-500/25'" class="px-3 lg:px-4 py-2 rounded-lg text-sm font-medium transition">Aus Website</button>
     <button @click="view='poster'" :class="view==='poster' ? 'bg-pink-500/30 text-pink-200' : 'bg-pink-500/15 text-pink-300 hover:bg-pink-500/25'" class="px-3 lg:px-4 py-2 rounded-lg text-sm font-medium transition">Poster erstellen</button>
     <button @click="showTemplateModal = true" class="px-3 lg:px-4 py-2 rounded-lg text-sm font-medium bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 transition">Template</button>
     <button @click="view='upload'; resetWizard()" :class="view==='upload' ? 'bg-amber-500 text-black' : 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/30'" class="px-3 lg:px-4 py-2 rounded-lg text-sm font-bold transition whitespace-nowrap">+ Neues Video</button>
   </div>
   <!-- Mobile burger -->
   <button @click="mobileMenu = !mobileMenu" class="md:hidden w-10 h-10 rounded-lg bg-white/5 hover:bg-white/10 flex flex-col items-center justify-center gap-1.5 flex-shrink-0">
     <div class="w-5 h-0.5 bg-white transition-all" :class="mobileMenu ? 'translate-y-2 rotate-45' : ''"></div>
     <div class="w-5 h-0.5 bg-white transition-all" :class="mobileMenu ? 'opacity-0' : ''"></div>
     <div class="w-5 h-0.5 bg-white transition-all" :class="mobileMenu ? '-translate-y-2 -rotate-45' : ''"></div>
   </button>
 </div>
 <!-- Mobile dropdown -->
 <div x-show="mobileMenu" @click.outside="mobileMenu = false" x-transition
      class="md:hidden border-t border-white/5 bg-[#0a0a0f]/95 backdrop-blur-md">
   <div class="px-3 py-3 flex flex-col gap-2">
     <button @click="view='library'; mobileMenu=false" :class="view==='library' ? 'bg-white/10' : 'hover:bg-white/5'" class="px-4 py-3 rounded-lg text-sm font-medium transition text-left">Bibliothek</button>
     <button @click="view='website'; resetWebsite(); mobileMenu=false" :class="view==='website' ? 'bg-cyan-500/30 text-cyan-200' : 'bg-cyan-500/15 text-cyan-300 hover:bg-cyan-500/25'" class="px-4 py-3 rounded-lg text-sm font-medium transition text-left">Aus Website</button>
     <button @click="view='poster'; mobileMenu=false" :class="view==='poster' ? 'bg-pink-500/30 text-pink-200' : 'bg-pink-500/15 text-pink-300 hover:bg-pink-500/25'" class="px-4 py-3 rounded-lg text-sm font-medium transition text-left">Poster erstellen</button>
     <button @click="showTemplateModal = true; mobileMenu=false" class="px-4 py-3 rounded-lg text-sm font-medium bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 transition text-left">Template</button>
     <button @click="view='upload'; resetWizard(); mobileMenu=false" :class="view==='upload' ? 'bg-amber-500 text-black' : 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/30'" class="px-4 py-3 rounded-lg text-sm font-bold transition text-left">+ Neues Video</button>
   </div>
 </div>
</header>

<main class="max-w-7xl mx-auto px-3 md:px-6 py-6 md:py-10">

<!-- ──────── LIBRARY VIEW ──────── -->
<template x-if="view==='library'">
<div>
 <div class="mb-8">
 <h1 class="text-2xl md:text-4xl font-black gradient-text">Deine Werbevideos</h1>
 <p class="text-white/50 mt-2" x-text="`${configs.length} Videos in deiner Bibliothek`"></p>
 </div>
 <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
 <template x-for="cfg in configs" :key="cfg.id">
 <div class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition cursor-pointer group" @click="openVideo(cfg)">
 <div class="aspect-video relative overflow-hidden" :style="`background:linear-gradient(135deg,${cfg.primary},${cfg.accent})`">
 <template x-if="cfg.hero">
 <img :src="`/posters/${cfg.hero}`" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition" />
 </template>
 <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent"></div>
 <div class="absolute bottom-3 left-3 right-3 flex items-end justify-between">
 <div>
 <div class="text-xs uppercase tracking-widest font-bold" :style="`color:${cfg.accent}`">Variant <span x-text="cfg.variant.toUpperCase()"></span></div>
 <div class="text-lg font-bold leading-tight" x-text="cfg.name"></div>
 </div>
 <template x-if="cfg.hasVideo">
 <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-2xl"></div>
 </template>
 </div>
 </div>
 <div class="p-4 flex items-center justify-between">
 <div class="text-sm text-white/60 italic" x-text="cfg.slogan"></div>
 <div class="flex gap-2">
 <button @click.stop="editConfig(cfg.id)" class="text-xs px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-lg">Bearbeiten</button>
 <button @click.stop="deleteConfig(cfg.id)" class="text-xs px-3 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg">Löschen</button>
 </div>
 </div>
 </div>
 </template>
 <template x-if="configs.length === 0">
 <div class="col-span-3 glass rounded-2xl p-16 text-center">
 <div class="text-4xl md:text-6xl mb-4"></div>
 <div class="text-xl font-bold mb-2">Noch keine Videos</div>
 <div class="text-white/50 mb-6">Lade dein erstes Poster hoch, um zu starten.</div>
 <button @click="view='upload'" class="bg-amber-500 hover:bg-amber-400 text-black font-bold px-6 py-3 rounded-lg">+ Video erstellen</button>
 </div>
 </template>
 </div>
</div>
</template>

<!-- ──────── POSTER/FLYER ERSTELLEN ──────── -->
<template x-if="view==='poster'">
<div class="max-w-4xl mx-auto">
 <h1 class="text-2xl md:text-4xl font-black gradient-text mb-6">Poster / Flyer erstellen</h1>

 <!-- Custom Dropdown (über andere Karten) -->
 <div class="glass rounded-2xl p-4 md:p-6 mb-5 relative" style="z-index:60;" x-data="{ open: false }">
  <label class="text-xs uppercase tracking-widest text-amber-400 font-bold block mb-3">Welche Daten hast du?</label>
  <div class="relative">
   <button @click="open = !open"
           class="w-full bg-white/5 hover:bg-white/8 border border-white/15 rounded-lg px-4 py-3 text-base text-left flex items-center justify-between focus:outline-none focus:border-amber-500">
    <span x-text="posterCases.find(c => c.id === posterCase)?.label || 'Wähle einen Fall'"></span>
    <span class="text-white/50 transition-transform" :class="open ? 'rotate-180' : ''">▾</span>
   </button>
   <div x-show="open" @click.outside="open = false" x-transition
        class="absolute mt-2 w-full bg-[#1a1a24] border border-white/15 rounded-lg shadow-2xl overflow-hidden"
        style="z-index:100;">
    <template x-for="pc in posterCases" :key="pc.id">
     <div @click="posterCase = pc.id; open = false"
          :class="posterCase === pc.id ? 'bg-amber-500/15 text-amber-300' : 'hover:bg-white/5'"
          class="px-4 py-3 cursor-pointer text-sm transition border-b border-white/5 last:border-b-0">
      <span x-text="pc.label"></span>
     </div>
    </template>
   </div>
  </div>
 </div>

 <!-- Optionale Eingabefelder (je nach Fall) -->
 <div class="glass rounded-2xl p-4 md:p-6 mb-5" x-show="posterCase">
  <label class="text-xs uppercase tracking-widest text-amber-400 font-bold block mb-3">Felder ausfüllen (optional)</label>

  <!-- Fall A: alle Felder -->
  <div x-show="posterCase==='A'" class="space-y-3">
   <div>
    <label class="text-xs text-white/50 block mb-1">Unternehmen <span class="text-red-400">*</span></label>
    <input type="text" x-model="posterForm.unternehmen" placeholder="z.B. Müller GmbH" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   </div>
   <div>
    <label class="text-xs text-white/50 block mb-1">Branche <span class="text-red-400">*</span></label>
    <input type="text" x-model="posterForm.branche" placeholder="z.B. Dachdeckerei" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   </div>
   <input type="text" x-model="posterForm.slogan" placeholder="Slogan" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   <textarea x-model="posterForm.leistungen" rows="2" placeholder="Leistungen (kommagetrennt)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3"></textarea>
   <input type="text" x-model="posterForm.adresse" placeholder="Adresse" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    <input type="text" x-model="posterForm.telefon" placeholder="Telefon" class="bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
    <input type="text" x-model="posterForm.email" placeholder="E-Mail" class="bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   </div>
   <input type="text" x-model="posterForm.website" placeholder="Website" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
   <input type="text" x-model="posterForm.cta" placeholder="Call-to-Action" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
  </div>

  <!-- Fall B: URL + Analyse-Button -->
  <div x-show="posterCase==='B'" class="space-y-3">
   <label class="text-xs text-white/50 block mb-1">Website-URL <span class="text-red-400">*</span></label>
   <div class="flex flex-col sm:flex-row gap-3">
    <input type="text" x-model="posterForm.website" placeholder="https://www.example.de" @keydown.enter="analyzeWebsiteForPoster()" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
    <button @click="analyzeWebsiteForPoster()" :disabled="websitePosterAnalyzing"
            :class="websitePosterAnalyzing ? 'opacity-60' : ''"
            class="bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 border border-cyan-500/40 px-5 py-3 rounded-lg font-bold whitespace-nowrap">
     <span x-show="!websitePosterAnalyzing">Webseite analysieren</span>
     <span x-show="websitePosterAnalyzing">Analysiere...</span>
    </button>
   </div>
   <div x-show="websitePosterError" class="text-xs text-red-400" x-text="websitePosterError"></div>
   <!-- Vorschau extrahierter Daten -->
   <div x-show="websitePosterDone" class="bg-cyan-500/5 border border-cyan-500/20 rounded-lg p-4 text-sm space-y-2">
    <div class="text-xs text-cyan-400 font-bold uppercase tracking-widest mb-2">Aus der Website extrahiert</div>
    <template x-for="(val, key) in posterForm" :key="key">
     <div x-show="val" class="grid grid-cols-3 gap-2">
      <div class="text-white/50 capitalize" x-text="key"></div>
      <div class="col-span-2 text-white/90" x-text="val"></div>
     </div>
    </template>
    <div class="text-xs text-white/40 italic mt-2">Diese Daten werden automatisch in den Prompt unten eingebaut.</div>
   </div>
  </div>

  <!-- Fall C: Branche -->
  <div x-show="posterCase==='C'">
   <label class="text-xs text-white/50 block mb-1">Branche <span class="text-red-400">*</span></label>
   <input type="text" x-model="posterForm.branche" placeholder="z.B. Auto-Waschanlage, Zahnarzt, Restaurant" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3" />
  </div>

  <!-- Fall D: alter Poster Upload -->
  <div x-show="posterCase==='D'">
   <label class="text-xs text-white/50 block mb-2">Bestehendes Poster <span class="text-red-400">*</span></label>
   <div @click="$refs.oldPosterInput.click()"
        @dragover.prevent="oldPosterDrag = true"
        @dragleave.prevent="oldPosterDrag = false"
        @drop.prevent="oldPosterDrag = false; handleOldPoster($event.dataTransfer.files[0])"
        :class="oldPosterDrag ? 'border-amber-400 bg-amber-500/10' : 'border-white/15 hover:border-amber-500/50'"
        class="cursor-pointer rounded-lg border-2 border-dashed transition p-6 text-center">
    <input type="file" x-ref="oldPosterInput" class="hidden" accept="image/*" @change="handleOldPoster($event.target.files[0])" />
    <template x-if="oldPosterPreview">
     <div>
      <img :src="oldPosterPreview" class="max-h-48 mx-auto mb-2 rounded" />
      <button @click.stop="oldPoster = null; oldPosterPreview = null" class="text-xs text-red-400 hover:text-red-300">Entfernen</button>
     </div>
    </template>
    <template x-if="!oldPosterPreview">
     <div class="text-white/50 text-sm">
      <div class="text-2xl mb-1">+</div>
      Bestehendes Poster hochladen oder reinziehen
     </div>
    </template>
   </div>
   <div class="text-xs text-white/40 mt-2 italic">KI nimmt dieses Poster als Vorlage und erstellt eine moderne, verbesserte Version.</div>
  </div>
 </div>

 <!-- Editierbarer Prompt -->
 <div class="glass rounded-2xl p-4 md:p-6 mb-5">
  <div class="flex items-center justify-between mb-3">
   <label class="text-xs uppercase tracking-widest text-amber-400 font-bold">Prompt <span class="text-white/40 normal-case font-normal">(editierbar)</span></label>
   <div class="flex items-center gap-3">
    <span class="text-xs text-white/40" x-text="posterCopyStatus"></span>
    <button @click="resetPromptToDefault()"
            class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1 rounded-md text-white/70 hover:text-white">
     Zurücksetzen
    </button>
   </div>
  </div>
  <textarea x-model="customPrompt"
            x-init="$watch('posterCase', () => { if (!promptManuallyEdited) customPrompt = generatedPrompt(); });
                    $watch('posterForm', () => { if (!promptManuallyEdited) customPrompt = generatedPrompt(); }, { deep: true });
                    if (!customPrompt) customPrompt = generatedPrompt();"
            @input="promptManuallyEdited = true"
            rows="14"
            class="w-full bg-black/40 border border-white/10 rounded-lg p-4 text-sm whitespace-pre-wrap font-mono leading-relaxed focus:outline-none focus:border-amber-500 resize-y"
            spellcheck="false"></textarea>
  <div class="text-xs text-white/40 mt-2 italic">Die KI nutzt diesen Prompt für die Bild-Generierung. Du kannst ihn anpassen.</div>
 </div>

 <!-- Format-Picker -->
 <div class="glass rounded-2xl p-4 md:p-6 mb-5">
  <label class="text-xs uppercase tracking-widest text-amber-400 font-bold block mb-3">Format</label>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
   <template x-for="fm in posterFormats" :key="fm.id">
    <div @click="posterFormat = fm.id"
         :class="posterFormat === fm.id ? 'border-amber-400 bg-amber-500/10' : 'border-white/10 hover:border-white/30'"
         class="cursor-pointer rounded-lg border-2 p-3 transition text-center">
     <div class="flex items-center justify-center mb-2 h-12">
      <div :style="`aspect-ratio:${fm.ratio};background:rgba(255,255,255,0.15);border-radius:4px;height:${fm.previewH}`"></div>
     </div>
     <div class="font-bold text-sm" x-text="fm.name"></div>
     <div class="text-xs text-white/50 mt-1" x-text="fm.dim"></div>
    </div>
   </template>
  </div>
 </div>

 <!-- Logo Upload (nur bei Fall A/B) -->
 <div class="glass rounded-2xl p-4 md:p-6 mb-5" x-show="posterCase === 'A' || posterCase === 'B'">
  <label class="text-xs uppercase tracking-widest text-amber-400 font-bold block mb-3">Logo (optional)</label>
  <div @click="$refs.posterLogoInput.click()"
       @dragover.prevent="posterLogoDrag = true"
       @dragleave.prevent="posterLogoDrag = false"
       @drop.prevent="posterLogoDrag = false; handlePosterLogo($event.dataTransfer.files[0])"
       :class="posterLogoDrag ? 'border-amber-400 bg-amber-500/10' : 'border-white/15 hover:border-amber-500/50'"
       class="cursor-pointer rounded-lg border-2 border-dashed transition p-6 text-center">
   <input type="file" x-ref="posterLogoInput" class="hidden" accept="image/*" @change="handlePosterLogo($event.target.files[0])" />
   <template x-if="posterLogoPreview">
    <div>
     <img :src="posterLogoPreview" class="max-h-28 mx-auto mb-2 rounded" />
     <button @click.stop="posterLogo = null; posterLogoPreview = null" class="text-xs text-red-400 hover:text-red-300">Entfernen</button>
    </div>
   </template>
   <template x-if="!posterLogoPreview">
    <div class="text-white/50 text-sm">
     <div class="text-2xl mb-1">+</div>
     Logo hochladen oder reinziehen
    </div>
   </template>
  </div>
  <div class="text-xs text-white/40 mt-2 italic">Logo wird oben links auf das Poster komponiert.</div>
 </div>

 <!-- Action Buttons (versteckt während Generierung) -->
 <div class="flex flex-wrap gap-3 mb-8" x-show="!posterGenerating">
  <button @click="copyPrompt()" class="bg-white/10 hover:bg-white/15 px-6 py-3 rounded-xl font-bold flex-1 min-w-[150px]">Prompt kopieren</button>
  <button @click="generatePoster()"
          class="bg-gradient-to-r from-amber-500 to-red-600 hover:from-amber-400 hover:to-red-500 text-black font-black px-6 py-3 rounded-xl flex-[2] min-w-[200px]">
   Poster generieren
  </button>
 </div>

 <!-- Progress View während Generierung -->
 <template x-if="posterGenerating">
  <div class="glass rounded-2xl p-6 md:p-10 mb-5 text-center">
   <!-- Animated spinner -->
   <div class="w-24 h-24 mx-auto mb-6 relative">
    <div class="absolute inset-0 rounded-full bg-gradient-to-br from-amber-500 to-red-600 animate-pulse"></div>
    <div class="absolute inset-2 rounded-full bg-[#0a0a0f] flex items-center justify-center">
     <svg class="animate-spin w-12 h-12 text-amber-400" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"/>
      <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4zm2 5.3A8 8 0 014 12H0c0 3 1.1 5.8 3 7.9l3-2.6z"/>
     </svg>
    </div>
   </div>
   <h2 class="text-2xl md:text-3xl font-black gradient-text mb-3" x-text="progressStep"></h2>
   <p class="text-white/60 mb-6" x-text="progressDetail"></p>
   <!-- Progress bar (zeitbasiert) -->
   <div class="max-w-md mx-auto bg-white/5 rounded-full h-2 overflow-hidden">
    <div class="h-full bg-gradient-to-r from-amber-500 to-red-600 transition-all duration-500"
         :style="`width: ${progressPercent}%`"></div>
   </div>
   <div class="text-xs text-white/40 mt-3" x-text="`${Math.round(progressPercent)}%`"></div>
  </div>
 </template>

 <!-- Result -->
 <template x-if="posterResult && !posterGenerating">
  <div class="glass rounded-2xl p-4 md:p-6 mb-5">
   <label class="text-xs uppercase tracking-widest text-green-400 font-bold block mb-3">Generiertes Poster</label>
   <img :src="posterResult.url" class="w-full rounded-lg mb-4" />
   <div class="flex flex-wrap gap-3">
    <a :href="posterResult.url" :download="`poster-${posterResult.id}.png`"
       class="bg-amber-500 hover:bg-amber-400 text-black font-bold px-6 py-3 rounded-xl flex-1 min-w-[150px] text-center">Herunterladen</a>
    <button @click="posterResult = null" class="bg-white/10 hover:bg-white/15 px-6 py-3 rounded-xl font-bold flex-1 min-w-[150px]">Neu generieren</button>
   </div>
  </div>
 </template>
</div>
</template>

      reader.readAsDataURL(file);
    },
    handleOldPoster(file) {
      if (!file || !file.type.startsWith('image/')) return;
      this.oldPoster = file;
      const reader = new FileReader();
      reader.onload = (e) => { this.oldPosterPreview = e.target.result; };
      reader.readAsDataURL(file);
    },
    async analyzeWebsiteForPoster() {
      const url = (this.posterForm.website || '').trim();
      if (!url) { this.websitePosterError = 'Bitte URL eingeben'; return; }
      this.websitePosterAnalyzing = true;
      this.websitePosterError = null;
      this.websitePosterDone = false;
      try {
        const r = await fetch('/api/poster/analyze-website', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Analyse fehlgeschlagen');
        // Daten in posterForm uebernehmen (nur ueberschreiben falls leer ODER neue Daten besser)
        for (const k of ['unternehmen','branche','slogan','leistungen','adresse','telefon','email','website','cta','primaerfarbe','sekundaerfarbe','bildmotive']) {
          if (data[k]) this.posterForm[k] = data[k];
        }
        this.websitePosterDone = true;
      } catch (e) {
        this.websitePosterError = e.message;
      } finally {
        this.websitePosterAnalyzing = false;
      }
    },
    startProgressAnimation() {
      const steps = this.posterCase === 'D'
        ? [
          { pct: 5,  step: 'Analysiere altes Poster...', detail: 'Claude liest Texte, Farben und Layout' },
          { pct: 25, step: 'Extrahiere Markenfarben',     detail: 'Logo, Hex-Codes und Branding werden erfasst' },
          { pct: 45, step: 'Erstelle Werbeagentur-Briefing', detail: 'Detaillierter Prompt für Bild-KI' },
          { pct: 65, step: 'Generiere neues Poster',      detail: 'OpenAI gpt-image-1 entwirft das Layout' },
          { pct: 85, step: 'Komponiere finales Bild',     detail: 'Letzte Details und Optimierung' },
          { pct: 95, step: 'Fertigstellen...',            detail: 'Poster wird gespeichert' },
        ]
        : [
          { pct: 10, step: 'Bereite Prompt vor...',       detail: 'Daten werden für die KI strukturiert' },
          { pct: 30, step: 'Sende an OpenAI',             detail: 'gpt-image-1 erhält den Auftrag' },
          { pct: 60, step: 'Generiere Layout',            detail: 'Hero-Bild, Text und Branding entstehen' },
          { pct: 85, step: 'Komponiere Logo',             detail: 'Dein Logo wird oben links eingefügt' },
          { pct: 95, step: 'Fertigstellen...',            detail: 'Poster wird gespeichert' },
        ];
      let i = 0;
      this.progressStep = steps[0].step;
      this.progressDetail = steps[0].detail;
      this.progressPercent = steps[0].pct;
      const totalDur = this.posterCase === 'D' ? 50000 : 35000;
      const stepDur = totalDur / steps.length;
      this.progressTimer = setInterval(() => {
        i++;
        if (i < steps.length) {
          this.progressStep = steps[i].step;
          this.progressDetail = steps[i].detail;
          this.progressPercent = steps[i].pct;
        } else {
          this.progressPercent = Math.min(98, this.progressPercent + 0.3);
        }
      }, stepDur);
    },
    stopProgressAnimation() {
      if (this.progressTimer) clearInterval(this.progressTimer);
      this.progressTimer = null;
      this.progressPercent = 100;
    },
    async generatePoster() {
      // Pflichtfeld-Validierung pro Fall
      const f = this.posterForm;
      if (this.posterCase === 'A' && (!f.unternehmen?.trim() || !f.branche?.trim())) {
        this.error = 'Pflichtfelder: Unternehmen und Branche'; return;
      }
      if (this.posterCase === 'B' && !f.website?.trim()) {
        this.error = 'Pflichtfeld: Website-URL'; return;
      }
      if (this.posterCase === 'C' && !f.branche?.trim()) {
        this.error = 'Pflichtfeld: Branche'; return;
      }
      if (this.posterCase === 'D' && !this.oldPoster) {
        this.error = 'Pflichtfeld: bestehendes Poster hochladen'; return;
      }
      this.posterGenerating = true;
      this.posterResult = null;
      this.startProgressAnimation();
      try {
        const fd = new FormData();
        fd.append('case', this.posterCase);
        // Editierten Prompt verwenden, fallback auf generierten
        fd.append('prompt', this.customPrompt || this.generatedPrompt());
        fd.append('format', this.posterFormat);
        if ((this.posterCase === 'A' || this.posterCase === 'B') && this.posterLogo) {
          fd.append('logo', this.posterLogo);
        }
        if (this.posterCase === 'D' && this.oldPoster) {
          fd.append('oldPoster', this.oldPoster);
        }
        const r = await fetch('/api/poster/generate', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Generierung fehlgeschlagen');
        this.posterResult = data;
      } catch (e) {
        this.error = e.message;
      } finally {
        this.stopProgressAnimation();
        this.posterGenerating = false;
      }
    },
    resetPromptToDefault() {
      this.customPrompt = this.generatedPrompt();
      this.promptManuallyEdited = false;
    },
    async copyPrompt() {
      try {
        await navigator.clipboard.writeText(this.customPrompt || this.generatedPrompt());
        this.posterCopyStatus = 'Kopiert!';
        setTimeout(() => { this.posterCopyStatus = ''; }, 2000);
      } catch (e) {
        this.posterCopyStatus = 'Fehler beim Kopieren';
      }
    },
    async init() {
      await this.loadConfigs();
    },
    resetWizard() {
      this.step = 'dropzone';
      this.config = null;
      this.currentId = null;
      this.job = null;
      this.finalVideoUrl = null;
      if (this.pollInterval) clearInterval(this.pollInterval);
    },
    async loadConfigs() {
      try {
        const r = await fetch('/api/configs');
        this.configs = await r.json();
      } catch (e) { this.error = e.message; }
    },
    openVideo(cfg) {
      if (cfg.hasVideo) this.modalVideo = cfg.videoUrl;
    },
    async editConfig(id) {
      try {
        const r = await fetch('/api/config/' + id);
        if (!r.ok) throw new Error('Config nicht gefunden');
        this.config = await r.json();
        this.currentId = id;
        this.view = 'upload';
        this.step = 'edit';
      } catch (e) { this.error = e.message; }
    },
    async deleteConfig(id) {
      if (!confirm('Wirklich löschen? Auch das Video wird entfernt.')) return;
      try {
        const r = await fetch('/api/config/' + id, { method: 'DELETE' });
        if (!r.ok) throw new Error('Löschen fehlgeschlagen');
        await this.loadConfigs();
      } catch (e) { this.error = e.message; }
    },
    async handleFile(file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) { this.error = 'Bitte ein Bild hochladen.'; return; }
      this.step = 'extracting';
      const fd = new FormData();
      fd.append('poster', file);
      try {
        const r = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Upload fehlgeschlagen');
        this.config = data.config;
        this.currentId = data.id;
        this.step = 'edit';
      } catch (e) {
        this.error = e.message;
        this.step = 'dropzone';
      }
    },
    async saveOnly() {
      try {
        await fetch('/api/config/' + this.currentId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.config),
        });
        this.view = 'library';
        await this.loadConfigs();
      } catch (e) { this.error = e.message; }
    },
    async saveAndRender() {
      try {
        await fetch('/api/config/' + this.currentId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.config),
        });
        const r = await fetch('/api/render/' + this.currentId, { method: 'POST' });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        this.step = 'rendering';
        this.pollJob(data.jobId);
      } catch (e) { this.error = e.message; }
    },
    async uploadBackground(slot, file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        this.error = 'Bitte ein Bild hochladen.';
        return;
      }
      const fd = new FormData();
      fd.append(slot, file);
      try {
        const r = await fetch(`/api/config/${this.currentId}/background`, {
          method: 'POST', body: fd,
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Upload fehlgeschlagen');
        this.config = data.config;
        this.assetReloadKey++;
      } catch (e) { this.error = e.message; }
    },
    async deleteBackground(slot) {
      try {
        const r = await fetch(`/api/config/${this.currentId}/background/${slot}`, {
          method: 'DELETE',
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Löschen fehlgeschlagen');
        this.config = data.config;
        this.assetReloadKey++;
      } catch (e) { this.error = e.message; }
    },
    resetWebsite() {
      this.website = { url: "", logoFile: null, logoPreview: null, logoName: "" };
      this.websiteLoading = false;
    },
    handleWebsiteLogo(file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        this.error = 'Bitte ein Bild als Logo hochladen.';
        return;
      }
      this.website.logoFile = file;
      this.website.logoName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => { this.website.logoPreview = e.target.result; };
      reader.readAsDataURL(file);
    },
    async analyzeWebsite() {
      if (!this.website.url) {
        this.error = 'Bitte eine Website-URL eingeben.';
        return;
      }
      this.websiteLoading = true;
      const fd = new FormData();
      fd.append('url', this.website.url);
      if (this.website.logoFile) fd.append('logo', this.website.logoFile);
      try {
        const r = await fetch('/api/from-website', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Analyse fehlgeschlagen');
        // Direkt zur Edit-Form mit der erstellten Config
        this.config = data.config;
        this.currentId = data.id;
        await this.loadConfigs();
        this.view = 'upload';
        this.step = 'edit';
      } catch (e) {
        this.error = e.message;
      } finally {
        this.websiteLoading = false;
      }
    },
    async applyTemplate(t) {
      // Mode 1: bereits in Edit-Form  Template-Werte überschreiben aktuelle config
      if (this.templateApplyMode && this.config) {
        this.config.variant = t.variant;
        this.config.fontPreset = t.fontPreset;
        this.config.duration = t.duration;
        this.config.design = { ...this.config.design, ...t.design };
        this.config.vorteile_label = t.placeholders.vorteile_label;
        // Optional: Texte überschreiben (nur wenn aktuelle Texte leer sind)
        // Hier überschreiben wir alle Texte mit Template-Defaults
        if (confirm("Auch Texte mit Template-Beispielen ersetzen? (Abbrechen = nur Variante/Farben/Schrift ändern)")) {
          this.config.unternehmen = { ...t.placeholders.unternehmen };
          this.config.headline = t.placeholders.headline;
          this.config.subheadline = t.placeholders.subheadline;
          this.config.vorteile = JSON.parse(JSON.stringify(t.placeholders.vorteile));
          this.config.cta = { ...t.placeholders.cta };
        }
        this.showTemplateModal = false;
        this.templateApplyMode = false;
        return;
      }
      // Mode 2: Neues Video aus Template starten (kein Poster)
      try {
        const r = await fetch('/api/config-from-template', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ template: t, name: this.templateNewName }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Template-Erstellung fehlgeschlagen');
        this.config = data.config;
        this.currentId = data.id;
        this.showTemplateModal = false;
        this.templateNewName = "";
        this.view = 'upload';
        this.step = 'edit';
      } catch (e) {
        this.error = e.message;
      }
    },
    pollJob(jobId) {
      this.pollInterval = setInterval(async () => {
        try {
          const r = await fetch('/api/jobs/' + jobId);
          const j = await r.json();
          this.job = j;
          if (j.status === 'done') {
            clearInterval(this.pollInterval);
            const fmt = this.config?.format || 'landscape';
            const suffix = { landscape: 'h', vertical: 'v', square: 'sq', portrait: 'pt' }[fmt] || 'h';
            this.finalVideoUrl = `/videos/${this.currentId}-cinematic-${suffix}.mp4?t=${Date.now()}`;
            this.step = 'done';
            await this.loadConfigs();
          } else if (j.status === 'error') {
            clearInterval(this.pollInterval);
            this.error = j.error || 'Rendering-Fehler';
            this.step = 'edit';
          }
        } catch (e) { /* keep polling */ }
      }, 1500);
    },
  };
}
</script>
</body>
</html>
